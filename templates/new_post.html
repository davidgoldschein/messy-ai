{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto animate-fade-in">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">Share a Messy Process</h1>
        <p class="text-slate-400">Describe a business process that's broken, manual, or overwhelming. AI enthusiasts
            will help you prototype a solution.</p>
    </div>

    <form action="{{ url_for('new_post') }}" method="POST" enctype="multipart/form-data"
        class="glass p-8 rounded-2xl space-y-6">
        <div class="space-y-2">
            <label for="title" class="text-sm font-semibold text-slate-300">Title</label>
            <input type="text" id="title" name="title" required
                placeholder="e.g., Manual Invoice Processing is Killing Us"
                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500 transition-colors">
        </div>

        <div class="space-y-2">
            <label for="category" class="text-sm font-semibold text-slate-300">Category</label>
            <select id="category" name="category" required
                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-300 focus:outline-none focus:border-brand-500 transition-colors appearance-none">
                <option value="General">General</option>
                <option value="Retail & Inventory">Retail & Inventory</option>
                <option value="Marketing & Sales">Marketing & Sales</option>
                <option value="Operations & HR">Operations & HR</option>
                <option value="Finance & Accounting">Finance & Accounting</option>
                <option value="Customer Support">Customer Support</option>
            </select>
        </div>

        <div class="space-y-2">
            <label for="description" class="text-sm font-semibold text-slate-300">Description</label>
            <textarea id="description" name="description" required rows="6"
                placeholder="Describe the process, the pain points, and what a better version would look like..."
                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500 transition-colors"></textarea>
        </div>

        <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-300">Upload Image</label>
            <div class="relative group">
                <input type="file" id="image_file" name="image_file" accept="image/*"
                    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                <div
                    class="w-full bg-slate-900/50 border border-slate-700 border-dashed rounded-xl px-4 py-6 text-center group-hover:border-brand-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-8 w-8 mx-auto text-slate-500 group-hover:text-brand-400 mb-2" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="text-sm text-slate-400">Click or drag and drop to upload an image</p>
                </div>
            </div>
        </div>

        <div class="space-y-2">
            <label for="image_url" class="text-sm font-semibold text-slate-300">Or Paste Image URL</label>
            <input type="url" id="image_url" name="image_url"
                placeholder="Paste a link to a screenshot or photo of the process"
                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500 transition-colors">
        </div>

        <div class="pt-4">
            <button type="submit"
                class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-brand-500/20 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                Post Process
            </button>
        </div>
    </form>
</div>
{% endblock %}

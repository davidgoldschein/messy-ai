{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-12 animate-fade-in">
    <div class="glass p-8 rounded-3xl border-white/10 shadow-2xl">
        <h1 class="text-3xl font-extrabold text-white text-center mb-2">Welcome Back</h1>
        <p class="text-slate-400 text-center mb-8 text-sm">Sign in to share messes or build solutions.</p>

        <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
            <div class="space-y-2">
                <label for="username" class="text-xs font-bold text-slate-300 uppercase tracking-wider">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500 transition-colors">
            </div>

            <div class="space-y-2">
                <label for="password" class="text-xs font-bold text-slate-300 uppercase tracking-wider">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500 transition-colors">
            </div>

            <button type="submit"
                class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-brand-500/20 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                Log In
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-400">
            Don't have an account? <a href="{{ url_for('register') }}"
                class="text-brand-400 hover:text-white transition-colors font-medium">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
